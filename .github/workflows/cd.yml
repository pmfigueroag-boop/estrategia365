# ============================================================
# Estrategia 365 Frontend — CD Pipeline (Cloud Run)
# ============================================================
# Build Next.js → Push to Artifact Registry → Deploy Cloud Run

name: CD — Frontend Deploy to Cloud Run

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # Workload Identity Federation

concurrency:
  group: cd-frontend-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: estrategia-365
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  REPO: estrategia365
  SERVICE_NAME: estrategia365-frontend
  # Backend API URL baked into the JS bundle at build time
  NEXT_PUBLIC_API_URL: https://estrategia-365-api-240909983026.us-east1.run.app

jobs:
  # ── 1. Build & Push ───────────────────────────────────────
  build-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inject API URL at build time — baked into JS bundle
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Set image output
        id: image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:${{ steps.meta.outputs.version }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

  # ── 2. Deploy to Cloud Run ────────────────────────────────
  deploy:
    name: 🚀 Deploy Frontend
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ needs.build-push.outputs.image }}
          flags: |
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --min-instances=1
            --max-instances=5
            --timeout=60
            --port=8080
            --set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1
          allow-unauthenticated: true

      - name: Show frontend URL
        run: echo "🌐 Frontend URL: ${{ steps.deploy.outputs.url }}"

  # ── 3. Smoke Test ─────────────────────────────────────────
  smoke-test:
    name: 💨 Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Get frontend URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Frontend URL: ${URL}"

      - name: Health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --retry 5 --retry-delay 5 --retry-connrefused \
            ${{ steps.url.outputs.url }})
          if [ "$STATUS" != "200" ]; then
            echo "❌ Frontend not responding: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Frontend healthy: HTTP $STATUS"

      - name: Check API connectivity
        run: |
          # Verify the API URL is baked correctly into the bundle
          BUNDLE=$(curl -sf ${{ steps.url.outputs.url }} | grep -o 'estrategia-365-api[^"]*' || echo "")
          if [ -n "$BUNDLE" ]; then
            echo "✅ API URL found in bundle: $BUNDLE"
          else
            echo "⚠️  API URL not found in HTML (may be in JS chunks — non-fatal)"
          fi
